name: Automate Repository Search Discoverability

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual click trigger from the Actions panel

permissions:
  contents: write

jobs:
  optimize-discoverability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v4

      # Automates injecting your custom SEO topic tags straight into GitHub API
      - name: Push Topic Tags and Metadata Definitions
        uses: actions/github-script@v7
        with:
          script: |
            const topics = [
              'ram-calculator', 'hardware-utility', 'android-apk', 'ddr5', 
              'ddr4', 'xmp', 'expo', 'jedec', 'hardware-advisor', 
              'pc-builder', 'sqlite-database', 'material-design', 'bangladesh'
            ];
            
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: topics
            });
