name: Mobile Security Scan & Release Production

on:
  push:
    tags:
      - 'v*' # Triggers on release tags like v1.0.1

permissions:
  contents: write
  security-events: write

jobs:
  secure-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      # 1. Automated Binary Security Scan (Ostorlab Mobile Scanner)
      - name: Run Mobile Security Assessment
        uses: ostorlab/ostorlab-action@v1.0.3  # Official Marketplace Mobile Scanner
        with:
          file_path: "./ram_advisor_release.apk"
        # Note: Results natively format into your GitHub 'Security' alerts tab.

      # 2. Automated Cryptographic Integrity Fingerprint
      - name: Generate SHA-256 Checksum Verification
        id: checksum
        run: |
          sha256sum ram_advisor_release.apk > checksum.txt
          echo "HASH=$(sha256sum ram_advisor_release.apk | awk '{print $1}')" >> $GITHUB_OUTPUT

      # 3. Create Public Production Launch Release
      - name: Publish Verified Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ram_advisor_release.apk
            checksum.txt
          name: Production Release ${{ github.ref_name }}
          body: |
            ### Privacy & Security Report
            * **Binary Integrity Verified**: This release contains verifiable assets.
            * **SHA-256 Signature**: `${{ steps.checksum.outputs.HASH }}`
            
            *Download the verified package directly from the assets below.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
